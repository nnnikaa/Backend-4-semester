services:
  consul:
    image: hashicorp/consul:1.20
    container_name: consul
    command: agent -server -ui -node=consul -bootstrap-expect=1 -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    volumes:
      - consul-data:/consul/data
    networks:
      - consul

volumes:
  consul-data:
  
networks:
  consul:
    driver: bridge